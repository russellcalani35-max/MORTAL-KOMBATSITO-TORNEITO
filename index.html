<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Torneo</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 40px;
    background-color: #1f3a5f; /* Azul oscuro elegante */
    color: white; /* Para que el texto se vea bien */
}
input, button {
    margin: 5px;
    padding: 6px;
}
h2 {
    margin-top: 30px;
}

.tabla-posiciones {
    margin: 20px auto;
    border-collapse: collapse;
    width: 70%;
    background-color: white;
}

.tabla-posiciones th {
    background-color: #2c3e50;
    color: white;
    padding: 10px;
}

.tabla-posiciones td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px dashed #999;
}

.tabla-posiciones th {
    border-bottom: 2px solid #2c3e50;
}

.tabla-posiciones td,
.tabla-posiciones th {
    border-right: 1px dashed #ccc;
}

.tabla-posiciones td:last-child,
.tabla-posiciones th:last-child {
    border-right: none;
}

.tabla-posiciones {
    width: 60%;
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.tabla-posiciones {
    background: white;
    color: black;
}

input {
    background: white;
    color: black;
}

.tabla-posiciones tr:nth-child(even) {
    background-color: #f2f2f2;
}

button {
    background-color: #3498db;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #2980b9;
}
</style>
</head>
<body>

<h1>MORTAL KOMBATCITO</h1>
<h3 class="firma">R.E.C.A.</h3>

<label>Cantidad de jugadores (2-8):</label>
<input type="number" id="numPlayers" min="2" max="8">
<button onclick="crearInputs()">Confirmar</button>

<div id="contenedorNombres"></div>
<div id="contenedorFixture"></div>
<div id="contenedorTabla"></div>

<script>

let jugadores = [];
let partidos = [];
let resultados = {};

function crearInputs() {
    let cantidad = document.getElementById("numPlayers").value;
    let contenedor = document.getElementById("contenedorNombres");
    contenedor.innerHTML = "";

    for (let i = 0; i < cantidad; i++) {
        contenedor.innerHTML += 
            `<input type="text" placeholder="Nombre jugador ${i+1}" id="jugador${i}"><br>`;
    }

    contenedor.innerHTML += 
        `<button onclick="guardarJugadores()">Guardar Jugadores</button>`;
}

function guardarJugadores() {
    jugadores = [];
    let cantidad = document.getElementById("numPlayers").value;

    for (let i = 0; i < cantidad; i++) {
        let nombre = document.getElementById("jugador" + i).value;
        jugadores.push(nombre);
    }

    generarFixture();
    mostrarFixture();

    console.log("Jugadores:", jugadores);
    console.log("Fixture:", partidos);
}

function generarFixture() {

    partidos = [];
    let lista = [...jugadores];

    // Si es impar agregamos "DESCANSA"
    if (lista.length % 2 !== 0) {
        lista.push("DESCANSA");
    }

    let n = lista.length;
    let rondas = n - 1;

    for (let r = 0; r < rondas; r++) {

        for (let i = 0; i < n / 2; i++) {
            let jug1 = lista[i];
            let jug2 = lista[n - 1 - i];

            if (jug1 !== "DESCANSA" && jug2 !== "DESCANSA") {
                partidos.push({ jug1, jug2, ronda: r + 1 });
            }
        }

        // Rotación tipo circular
        lista.splice(1, 0, lista.pop());
    }

    console.log("Partidos generados:", partidos);
}

function mostrarFixture() {

    let contenedor = document.getElementById("contenedorFixture");
    contenedor.innerHTML = "<h2>Fixture del Torneo</h2>";

    let rondaActual = 0;

    partidos.forEach((partido, index) => {

        if (partido.ronda !== rondaActual) {
            rondaActual = partido.ronda;
            contenedor.innerHTML += `<h3>Ronda ${rondaActual}</h3>`;
        }

        contenedor.innerHTML += `
            <div>
                ${partido.jug1}
                <input type="number" min="0" id="p${index}a" style="width:60px">
                vs
                <input type="number" min="0" id="p${index}b" style="width:60px">
                ${partido.jug2}
            </div>
        `;
    });

    contenedor.innerHTML += `<br><button onclick="calcularTabla()">Mostrar Tabla</button>`;
}

function calcularTabla() {

    resultados = {};

    // Inicializar estructura
    jugadores.forEach(j => {
        resultados[j] = [];
    });

    partidos.forEach((partido, index) => {

        let puntos1 = parseInt(document.getElementById("p" + index + "a").value);
        let puntos2 = parseInt(document.getElementById("p" + index + "b").value);

        if (!isNaN(puntos1) && !isNaN(puntos2)) {
            resultados[partido.jug1].push(puntos1);
            resultados[partido.jug2].push(puntos2);
        }
    });

    mostrarTabla();
}

function mostrarTabla() {

    let contenedor = document.getElementById("contenedorTabla");
    contenedor.innerHTML = "<h2>Tabla de Posiciones</h2>";

    let tabla = [];

    jugadores.forEach(j => {
        let total = resultados[j].reduce((a,b) => a + b, 0);

        tabla.push({
            nombre: j,
            total: total,
            detalle: resultados[j]
        });
    });

    tabla.sort((a,b) => b.total - a.total);

    let html = `
        <table class="tabla-posiciones">
            <thead>
                <tr>
                    <th>Jugador</th>
                    <th>Total</th>
                    <th>Puntos por partido</th>
                </tr>
            </thead>
            <tbody>
    `;

    tabla.forEach(j => {
        html += `
            <tr>
                <td>${j.nombre}</td>
                <td>${j.total}</td>
                <td>${j.detalle.join(" - ")}</td>
            </tr>
        `;
    });

    html += `
            </tbody>
        </table>
    `;

    contenedor.innerHTML += html;
}

</script>

</body>
</html>
