<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Torneo</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
      background-color: #1f3a5f;
      color: white;
    }

    input, button {
      margin: 5px;
      padding: 6px;
    }

    h2 {
      margin-top: 30px;
    }

    .tabla-posiciones {
      width: 75%;
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      color: black;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .tabla-posiciones th {
      background-color: #2c3e50;
      color: white;
      padding: 10px;
      border-bottom: 2px solid #2c3e50;
    }

    .tabla-posiciones td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px dashed #999;
    }

    .tabla-posiciones td, .tabla-posiciones th {
      border-right: 1px dashed #ccc;
    }

    .tabla-posiciones td:last-child, .tabla-posiciones th:last-child {
      border-right: none;
    }

    .tabla-posiciones tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #2980b9;
    }

    .btn-reset {
      background-color: #e74c3c;
    }

    .btn-reset:hover {
      background-color: #c0392b;
    }

    .btn-vuelta {
      background-color: #27ae60;
    }

    .btn-vuelta:hover {
      background-color: #1e8449;
    }

    .btn-editar {
      background-color: #f39c12;
    }

    .btn-editar:hover {
      background-color: #d68910;
    }

    .btn-agregar {
      background-color: #8e44ad;
    }

    .btn-agregar:hover {
      background-color: #6c3483;
    }

    .botonera {
      margin-top: 15px;
    }

    .partido {
      margin: 8px 0;
    }

    .firma {
      margin-top: -10px;
      margin-bottom: 20px;
      font-weight: normal;
      opacity: 0.9;
    }

    .panel {
      margin: 20px auto;
      width: 80%;
      max-width: 900px;
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 10px;
    }

    .jugador-edit {
      margin: 6px 0;
    }
  </style>
</head>
<body>

  <h1>MORTAL KOMBATCITO</h1>
  <h3 class="firma">R.E.C.A.</h3>

  <label>Cantidad de jugadores (2-8):</label>
  <input type="number" id="numPlayers" min="2" max="30">
  <button onclick="crearInputs()">Confirmar</button>
  <button class="btn-reset" onclick="resetearTorneo()">Resetear torneo</button>

  <div id="contenedorNombres"></div>
  <div id="panelEdicion"></div>
  <div id="contenedorFixture"></div>
  <div id="contenedorTabla"></div>

  <script>
    let jugadores = []; 
    let partidos = []; 
    let resultados = {}; 
    let vueltaGenerada = false;
    let ultimoJugadorId = 0;

    function generarIdJugador() {
      ultimoJugadorId++;
      return ultimoJugadorId;
    }

    function obtenerNombreJugador(id) {
      const jugador = jugadores.find(j => j.id === id);
      return jugador ? jugador.nombre : "Desconocido";
    }

    function guardarEstado() {
      const estado = {
        jugadores,
        partidos,
        resultados,
        vueltaGenerada,
        ultimoJugadorId,
        numPlayers: document.getElementById("numPlayers").value
      };
      localStorage.setItem("torneoMK", JSON.stringify(estado));
    }

    function cargarEstado() {
      const estadoGuardado = localStorage.getItem("torneoMK");
      if (!estadoGuardado) return;

      const estado = JSON.parse(estadoGuardado);

      jugadores = estado.jugadores || [];
      partidos = estado.partidos || [];
      resultados = estado.resultados || {};
      vueltaGenerada = estado.vueltaGenerada || false;
      ultimoJugadorId = estado.ultimoJugadorId || 0;

      if (estado.numPlayers) {
        document.getElementById("numPlayers").value = estado.numPlayers;
      }

      if (jugadores.length > 0) {
        renderPanelEdicion();
        mostrarFixture();
        calcularTabla();
      }
    }

    function crearInputs() {
      let cantidad = parseInt(document.getElementById("numPlayers").value);
      let contenedor = document.getElementById("contenedorNombres");
      contenedor.innerHTML = "";

      if (isNaN(cantidad) || cantidad < 2) {
        alert("Ingresa una cantidad válida de jugadores.");
        return;
      }

      for (let i = 0; i < cantidad; i++) {
        contenedor.innerHTML += `
          <input type="text" placeholder="Nombre jugador ${i + 1}" id="jugador${i}"><br>
        `;
      }

      contenedor.innerHTML += `<button onclick="guardarJugadoresIniciales()">Guardar Jugadores</button>`;
    }

    function guardarJugadoresIniciales() {
      jugadores = [];
      partidos = [];
      resultados = {};
      vueltaGenerada = false;
      ultimoJugadorId = 0;

      let cantidad = parseInt(document.getElementById("numPlayers").value);

      for (let i = 0; i < cantidad; i++) {
        let nombre = document.getElementById("jugador" + i).value.trim();

        if (nombre === "") {
          alert("Todos los jugadores deben tener nombre.");
          return;
        }

        jugadores.push({
          id: generarIdJugador(),
          nombre: nombre
        });
      }

      generarFixtureInicial();
      renderPanelEdicion();
      mostrarFixture();
      calcularTabla();
      guardarEstado();
    }

    function generarFixtureInicial() {
      partidos = [];
      generarPartidosTodosContraTodos(jugadores.map(j => j.id), "Ida");
    }

    function generarPartidosTodosContraTodos(idsJugadores, tipo) {
      let lista = [...idsJugadores];

      if (lista.length % 2 !== 0) {
        lista.push("DESCANSA");
      }

      let n = lista.length;
      let rondas = n - 1;
      let rondaBase = partidos.length > 0 ? Math.max(...partidos.map(p => p.ronda)) : 0;

      for (let r = 0; r < rondas; r++) {
        for (let i = 0; i < n / 2; i++) {
          let jug1 = lista[i];
          let jug2 = lista[n - 1 - i];

          if (jug1 !== "DESCANSA" && jug2 !== "DESCANSA") {
            partidos.push({
              jug1Id: jug1,
              jug2Id: jug2,
              ronda: rondaBase + r + 1,
              tipo: tipo
            });
          }
        }

        lista.splice(1, 0, lista.pop());
      }
    }

    function generarVuelta() {
      if (vueltaGenerada) {
        alert("La vuelta ya fue generada.");
        return;
      }

      const partidosIda = partidos.filter(p => p.tipo === "Ida");
      const ultimaRonda = Math.max(...partidosIda.map(p => p.ronda));

      partidosIda.forEach(p => {
        partidos.push({
          jug1Id: p.jug2Id,
          jug2Id: p.jug1Id,
          ronda: p.ronda + ultimaRonda,
          tipo: "Vuelta"
        });
      });

      vueltaGenerada = true;
      mostrarFixture();
      calcularTabla();
      guardarEstado();
    }

    function renderPanelEdicion() {
      const panel = document.getElementById("panelEdicion");

      if (jugadores.length === 0) {
        panel.innerHTML = "";
        return;
      }

      let html = `
        <div class="panel">
          <h2>Editar / Agregar jugadores</h2>
          <div id="listaEdicionJugadores">
      `;

      jugadores.forEach((jugador, index) => {
        html += `
          <div class="jugador-edit">
            <label>Jugador ${index + 1}:</label>
            <input type="text" id="editJugador${jugador.id}" value="${jugador.nombre}">
          </div>
        `;
      });

      html += `
          </div>
          <button class="btn-editar" onclick="guardarEdicionNombres()">Guardar cambios de nombres</button>
          <hr style="margin:15px 0;">
          <input type="text" id="nuevoJugadorNombre" placeholder="Nuevo jugador">
          <button class="btn-agregar" onclick="agregarJugador()">Agregar jugador</button>
          <button class="btn-agregar" onclick="generarPartidosNuevosJugadores()">Generar versus para nuevos jugadores</button>
        </div>
      `;

      panel.innerHTML = html;
    }

    function guardarEdicionNombres() {
      jugadores.forEach(jugador => {
        const input = document.getElementById("editJugador" + jugador.id);
        if (input) {
          const nuevoNombre = input.value.trim();
          if (nuevoNombre !== "") {
            jugador.nombre = nuevoNombre;
          }
        }
      });

      mostrarFixture();
      calcularTabla();
      renderPanelEdicion();
      guardarEstado();
    }

    function agregarJugador() {
      const input = document.getElementById("nuevoJugadorNombre");
      const nombre = input.value.trim();

      if (nombre === "") {
        alert("Escribe el nombre del nuevo jugador.");
        return;
      }

      jugadores.push({
        id: generarIdJugador(),
        nombre: nombre
      });

      input.value = "";
      renderPanelEdicion();
      mostrarFixture();
      calcularTabla();
      guardarEstado();
    }

    function generarPartidosNuevosJugadores() {
      const jugadoresSinPartidos = jugadores.filter(j => {
        return !partidos.some(p => p.jug1Id === j.id || p.jug2Id === j.id);
      });

      if (jugadoresSinPartidos.length === 0) {
        alert("No hay jugadores nuevos sin partidos.");
        return;
      }

      const idsNuevos = jugadoresSinPartidos.map(j => j.id);
      const idsAntiguos = jugadores
        .filter(j => !idsNuevos.includes(j.id))
        .map(j => j.id);

      let rondaBase = partidos.length > 0 ? Math.max(...partidos.map(p => p.ronda)) : 0;
      let rondaActual = rondaBase + 1;

      // Nuevos vs antiguos
      idsNuevos.forEach(idNuevo => {
        idsAntiguos.forEach(idAntiguo => {
          partidos.push({
            jug1Id: idNuevo,
            jug2Id: idAntiguo,
            ronda: rondaActual,
            tipo: "Nuevos vs Antiguos"
          });
          rondaActual++;
        });
      });

      // Nuevos vs nuevos
      for (let i = 0; i < idsNuevos.length; i++) {
        for (let j = i + 1; j < idsNuevos.length; j++) {
          partidos.push({
            jug1Id: idsNuevos[i],
            jug2Id: idsNuevos[j],
            ronda: rondaActual,
            tipo: "Nuevos"
          });
          rondaActual++;
        }
      }

      mostrarFixture();
      calcularTabla();
      guardarEstado();
    }

    function mostrarFixture() {
      let contenedor = document.getElementById("contenedorFixture");
      contenedor.innerHTML = "<h2>Fixture del Torneo</h2>";

      let rondaActual = null;

      partidos.forEach((partido, index) => {
        if (partido.ronda !== rondaActual) {
          rondaActual = partido.ronda;
          contenedor.innerHTML += `<h3>Ronda ${rondaActual} - ${partido.tipo || ""}</h3>`;
        }

        let valorA = resultados[index] ? resultados[index].a : "";
        let valorB = resultados[index] ? resultados[index].b : "";

        contenedor.innerHTML += `
          <div class="partido">
            ${obtenerNombreJugador(partido.jug1Id)}
            <input type="number" min="0" id="p${index}a" value="${valorA}" style="width:60px" onchange="guardarResultado(${index})">
            vs
            <input type="number" min="0" id="p${index}b" value="${valorB}" style="width:60px" onchange="guardarResultado(${index})">
            ${obtenerNombreJugador(partido.jug2Id)}
          </div>
        `;
      });

      contenedor.innerHTML += `
        <div class="botonera">
          <button onclick="calcularTabla()">Mostrar Tabla</button>
          <button class="btn-vuelta" onclick="generarVuelta()">Jugar Vuelta</button>
        </div>
      `;
    }

    function guardarResultado(index) {
      let puntos1 = parseInt(document.getElementById("p" + index + "a").value);
      let puntos2 = parseInt(document.getElementById("p" + index + "b").value);

      if (!isNaN(puntos1) && !isNaN(puntos2)) {
        resultados[index] = { a: puntos1, b: puntos2 };
      } else {
        delete resultados[index];
      }

      guardarEstado();
      calcularTabla();
    }

    function calcularTabla() {
      let contenedor = document.getElementById("contenedorTabla");
      contenedor.innerHTML = "<h2>Tabla de Posiciones</h2>";

      let acumulado = {};

      jugadores.forEach(j => {
        acumulado[j.id] = [];
      });

      partidos.forEach((partido, index) => {
        if (resultados[index]) {
          if (acumulado[partido.jug1Id]) acumulado[partido.jug1Id].push(resultados[index].a);
          if (acumulado[partido.jug2Id]) acumulado[partido.jug2Id].push(resultados[index].b);
        }
      });

      let tabla = jugadores.map(j => {
        let detalle = acumulado[j.id] || [];
        let total = detalle.reduce((a, b) => a + b, 0);

        return {
          id: j.id,
          nombre: j.nombre,
          total: total,
          detalle: detalle
        };
      });

      tabla.sort((a, b) => b.total - a.total);

      let html = `
        <table class="tabla-posiciones">
          <thead>
            <tr>
              <th>Jugador</th>
              <th>Total</th>
              <th>Puntos por partido</th>
            </tr>
          </thead>
          <tbody>
      `;

      tabla.forEach(j => {
        html += `
          <tr>
            <td>${j.nombre}</td>
            <td>${j.total}</td>
            <td>${j.detalle.length > 0 ? j.detalle.join(" - ") : "-"}</td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      contenedor.innerHTML += html;
      guardarEstado();
    }

    function resetearTorneo() {
      if (confirm("¿Seguro que quieres resetear todo el torneo?")) {
        localStorage.removeItem("torneoMK");
        jugadores = [];
        partidos = [];
        resultados = {};
        vueltaGenerada = false;
        ultimoJugadorId = 0;

        document.getElementById("numPlayers").value = "";
        document.getElementById("contenedorNombres").innerHTML = "";
        document.getElementById("panelEdicion").innerHTML = "";
        document.getElementById("contenedorFixture").innerHTML = "";
        document.getElementById("contenedorTabla").innerHTML = "";
      }
    }

    window.onload = function () {
      cargarEstado();
    };
  </script>

</body>
</html>
