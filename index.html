<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torneo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 40px;
      background-color: #1f3a5f;
      color: white;
    }

    input, button, textarea {
      margin: 5px;
      padding: 6px;
      border-radius: 5px;
      border: none;
    }

    input, textarea {
      background: white;
      color: black;
    }

    button {
      background-color: #3498db;
      color: white;
      cursor: pointer;
      padding: 8px 15px;
    }

    button:hover {
      background-color: #2980b9;
    }

    h2 {
      margin-top: 30px;
    }

    .tabla-posiciones {
      margin: 20px auto;
      border-collapse: collapse;
      width: 75%;
      background-color: white;
      color: black;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .tabla-posiciones th {
      background-color: #2c3e50;
      color: white;
      padding: 10px;
      border-bottom: 2px solid #2c3e50;
    }

    .tabla-posiciones td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px dashed #999;
    }

    .tabla-posiciones td, .tabla-posiciones th {
      border-right: 1px dashed #ccc;
    }

    .tabla-posiciones td:last-child, .tabla-posiciones th:last-child {
      border-right: none;
    }

    .tabla-posiciones tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    .btn-reset {
      background-color: #e74c3c;
    }

    .btn-reset:hover {
      background-color: #c0392b;
    }

    .btn-vuelta {
      background-color: #27ae60;
    }

    .btn-vuelta:hover {
      background-color: #1e8449;
    }

    .btn-editar {
      background-color: #f39c12;
    }

    .btn-editar:hover {
      background-color: #d68910;
    }

    .btn-guardar {
      background-color: #16a085;
    }

    .btn-guardar:hover {
      background-color: #138d75;
    }

    .btn-agregar {
      background-color: #8e44ad;
    }

    .btn-agregar:hover {
      background-color: #6c3483;
    }

    .firma {
      margin-top: -10px;
      margin-bottom: 20px;
      font-weight: normal;
      opacity: 0.9;
    }

    .partido {
      margin: 8px 0;
    }

    .panel-edicion {
      margin: 20px auto;
      width: 75%;
      max-width: 900px;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
    }

    .oculto {
      display: none;
    }

    .fila-botones {
      margin-top: 10px;
    }

    .bloque-editor {
      margin: 10px 0;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
    }

    textarea {
      width: 80%;
      max-width: 500px;
      min-height: 100px;
      resize: vertical;
    }
  </style>
</head>
<body>

  <h1>MORTAL KOMBATCITO</h1>
  <h3 class="firma">R.E.C.A.</h3>

  <label>Cantidad de jugadores (2 o más):</label>
  <input type="number" id="numPlayers" min="2">
  <button onclick="crearInputs()">Confirmar</button>
  <button class="btn-reset" onclick="resetearTorneo()">Resetear torneo</button>

  <div id="contenedorNombres"></div>

  <div id="panelEdicion" class="panel-edicion oculto">
    <h2>Editar / Añadir jugadores</h2>

    <div class="bloque-editor">
      <h3>Editar nombres</h3>
      <div id="inputsEdicion"></div>
      <button class="btn-editar" onclick="guardarEdicionJugadores()">Guardar edición</button>
    </div>

    <div class="bloque-editor">
      <h3>Añadir jugadores</h3>
      <p>Escribe un nombre por línea:</p>
      <textarea id="nuevosJugadores" placeholder="Ejemplo:
Scorpion
Sub-Zero
Raiden"></textarea><br>
      <button class="btn-agregar" onclick="agregarVariosJugadores()">Añadir jugadores</button>
    </div>
  </div>

  <div id="contenedorFixture"></div>
  <div id="contenedorTabla"></div>

  <script>
    let jugadores = [];
    let partidos = [];
    let resultados = {};
    let vueltaGenerada = false;
    let ultimoJugadorId = 0;

    function generarIdJugador() {
      ultimoJugadorId++;
      return ultimoJugadorId;
    }

    function guardarEstado() {
      const estado = {
        jugadores,
        partidos,
        resultados,
        vueltaGenerada,
        ultimoJugadorId,
        numPlayers: document.getElementById("numPlayers").value
      };
      sessionStorage.setItem("torneoMK", JSON.stringify(estado));
    }

    function cargarEstado() {
      const estadoGuardado = sessionStorage.getItem("torneoMK");
      if (!estadoGuardado) return;

      const estado = JSON.parse(estadoGuardado);

      jugadores = estado.jugadores || [];
      partidos = estado.partidos || [];
      resultados = estado.resultados || {};
      vueltaGenerada = estado.vueltaGenerada || false;
      ultimoJugadorId = estado.ultimoJugadorId || 0;

      if (estado.numPlayers) {
        document.getElementById("numPlayers").value = estado.numPlayers;
      }

      if (jugadores.length > 0) {
        mostrarBotoneraJugadoresGuardados();
        cargarPanelEdicion();
        mostrarFixture();
        calcularTabla();
      }
    }

    function crearInputs() {
      let cantidad = parseInt(document.getElementById("numPlayers").value);
      let contenedor = document.getElementById("contenedorNombres");
      contenedor.innerHTML = "";

      if (isNaN(cantidad) || cantidad < 2) {
        alert("Ingresa una cantidad válida de al menos 2 jugadores.");
        return;
      }

      for (let i = 0; i < cantidad; i++) {
        contenedor.innerHTML += `
          <input type="text" placeholder="Nombre jugador ${i + 1}" id="jugador${i}"><br>
        `;
      }

      contenedor.innerHTML += `
        <div class="fila-botones" id="botonesJugadores">
          <button class="btn-guardar" onclick="guardarJugadores()">Guardar jugadores</button>
        </div>
      `;
    }

    function mostrarBotoneraJugadoresGuardados() {
      let html = `
        <div class="fila-botones" id="botonesJugadores">
          <button class="btn-guardar" onclick="guardarJugadores()">Guardar jugadores</button>
          <button class="btn-editar" onclick="togglePanelEdicion()">Editar/Añadir jugadores</button>
        </div>
      `;

      const actual = document.getElementById("botonesJugadores");
      if (actual) {
        actual.outerHTML = html;
      } else {
        document.getElementById("contenedorNombres").innerHTML += html;
      }
    }

    function guardarJugadores() {
      let cantidad = parseInt(document.getElementById("numPlayers").value);

      if (jugadores.length === 0) {
        jugadores = [];
        partidos = [];
        resultados = {};
        vueltaGenerada = false;
        ultimoJugadorId = 0;

        for (let i = 0; i < cantidad; i++) {
          let nombre = document.getElementById("jugador" + i).value.trim();

          if (nombre === "") {
            alert("Todos los jugadores deben tener nombre.");
            return;
          }

          jugadores.push({
            id: generarIdJugador(),
            nombre: nombre
          });
        }

        regenerarTorneoCompleto(false);
      }

      mostrarBotoneraJugadoresGuardados();
      cargarPanelEdicion();
      mostrarFixture();
      calcularTabla();
      guardarEstado();
    }

    function togglePanelEdicion() {
      const panel = document.getElementById("panelEdicion");
      panel.classList.toggle("oculto");
      if (!panel.classList.contains("oculto")) {
        cargarPanelEdicion();
      }
    }

    function cargarPanelEdicion() {
      const inputsEdicion = document.getElementById("inputsEdicion");
      inputsEdicion.innerHTML = "";

      jugadores.forEach((jugador, i) => {
        inputsEdicion.innerHTML += `
          <div>
            <label>Jugador ${i + 1}:</label>
            <input type="text" id="editJugador${jugador.id}" value="${jugador.nombre}">
          </div>
        `;
      });
    }

    function guardarEdicionJugadores() {
      jugadores.forEach(jugador => {
        let input = document.getElementById("editJugador" + jugador.id);
        if (input) {
          let nuevoNombre = input.value.trim();
          if (nuevoNombre !== "") {
            jugador.nombre = nuevoNombre;
          }
        }
      });

      mostrarFixture();
      calcularTabla();
      guardarEstado();
      alert("Nombres actualizados correctamente.");
    }

    function agregarVariosJugadores() {
      const texto = document.getElementById("nuevosJugadores").value.trim();

      if (texto === "") {
        alert("Escribe al menos un nombre.");
        return;
      }

      const nombres = texto
        .split("\n")
        .map(n => n.trim())
        .filter(n => n !== "");

      if (nombres.length === 0) {
        alert("No hay nombres válidos.");
        return;
      }

      nombres.forEach(nombre => {
        jugadores.push({
          id: generarIdJugador(),
          nombre: nombre
        });
      });

      document.getElementById("nuevosJugadores").value = "";
      document.getElementById("numPlayers").value = jugadores.length;

      regenerarTorneoCompleto(vueltaGenerada);

      cargarPanelEdicion();
      mostrarFixture();
      calcularTabla();
      guardarEstado();
    }

    function generarFixtureBase(listaIds, tipo, invertirLocalia = false) {
      let partidosGenerados = [];
      let lista = [...listaIds];

      if (lista.length % 2 !== 0) {
        lista.push("DESCANSA");
      }

      let n = lista.length;
      let rondas = n - 1;

      for (let r = 0; r < rondas; r++) {
        for (let i = 0; i < n / 2; i++) {
          let a = lista[i];
          let b = lista[n - 1 - i];

          if (a !== "DESCANSA" && b !== "DESCANSA") {
            partidosGenerados.push({
              jug1Id: invertirLocalia ? b : a,
              jug2Id: invertirLocalia ? a : b,
              ronda: r + 1,
              tipo: tipo
            });
          }
        }

        lista.splice(1, 0, lista.pop());
      }

      return partidosGenerados;
    }

    function clavePartido(jug1Id, jug2Id, tipo) {
      return `${jug1Id}-${jug2Id}-${tipo}`;
    }

    function regenerarTorneoCompleto(incluirVuelta) {
      const resultadosViejos = { ...resultados };
      const partidosViejos = [...partidos];
      const mapaResultados = {};

      partidosViejos.forEach((p, index) => {
        if (resultadosViejos[index]) {
          mapaResultados[clavePartido(p.jug1Id, p.jug2Id, p.tipo)] = {
            a: resultadosViejos[index].a,
            b: resultadosViejos[index].b
          };
        }
      });

      const ids = jugadores.map(j => j.id);

      let nuevosPartidos = generarFixtureBase(ids, "Ida", false);

      if (incluirVuelta) {
        const idaCantidadRondas = Math.max(...nuevosPartidos.map(p => p.ronda));
        let vuelta = generarFixtureBase(ids, "Vuelta", true);

        vuelta = vuelta.map(p => ({
          ...p,
          ronda: p.ronda + idaCantidadRondas
        }));

        nuevosPartidos = nuevosPartidos.concat(vuelta);
      }

      partidos = nuevosPartidos;
      resultados = {};

      partidos.forEach((p, index) => {
        const clave = clavePartido(p.jug1Id, p.jug2Id, p.tipo);
        if (mapaResultados[clave]) {
          resultados[index] = mapaResultados[clave];
        }
      });
    }

    function generarVuelta() {
      if (vueltaGenerada) {
        alert("La vuelta ya fue generada.");
        return;
      }

      vueltaGenerada = true;
      regenerarTorneoCompleto(true);
      mostrarFixture();
      calcularTabla();
      guardarEstado();
    }

    function obtenerNombreJugador(id) {
      const jugador = jugadores.find(j => j.id === id);
      return jugador ? jugador.nombre : "Desconocido";
    }

    function mostrarFixture() {
      let contenedor = document.getElementById("contenedorFixture");
      contenedor.innerHTML = "<h2>Fixture del Torneo</h2>";

      if (partidos.length === 0) {
        contenedor.innerHTML += "<p>No hay partidos generados todavía.</p>";
        return;
      }

      let rondaActual = 0;

      partidos.forEach((partido, index) => {
        if (partido.ronda !== rondaActual) {
          rondaActual = partido.ronda;
          contenedor.innerHTML += `<h3>Ronda ${rondaActual} - ${partido.tipo}</h3>`;
        }

        let valorA = resultados[index] ? resultados[index].a : "";
        let valorB = resultados[index] ? resultados[index].b : "";

        contenedor.innerHTML += `
          <div class="partido">
            ${obtenerNombreJugador(partido.jug1Id)}
            <input type="number" min="0" id="p${index}a" value="${valorA}" style="width:60px" onchange="guardarResultado(${index})">
            vs
            <input type="number" min="0" id="p${index}b" value="${valorB}" style="width:60px" onchange="guardarResultado(${index})">
            ${obtenerNombreJugador(partido.jug2Id)}
          </div>
        `;
      });

      contenedor.innerHTML += `
        <br>
        <button onclick="calcularTabla()">Mostrar Tabla</button>
        <button class="btn-vuelta" onclick="generarVuelta()">Jugar Vuelta</button>
      `;
    }

    function guardarResultado(index) {
      let puntos1 = parseInt(document.getElementById("p" + index + "a").value);
      let puntos2 = parseInt(document.getElementById("p" + index + "b").value);

      if (!isNaN(puntos1) && !isNaN(puntos2)) {
        resultados[index] = { a: puntos1, b: puntos2 };
      } else {
        delete resultados[index];
      }

      guardarEstado();
      calcularTabla();
    }

    function calcularTabla() {
      let contenedor = document.getElementById("contenedorTabla");
      contenedor.innerHTML = "<h2>Tabla de Posiciones</h2>";

      let acumulado = {};

      jugadores.forEach(j => {
        acumulado[j.id] = [];
      });

      partidos.forEach((partido, index) => {
        if (resultados[index]) {
          acumulado[partido.jug1Id].push(resultados[index].a);
          acumulado[partido.jug2Id].push(resultados[index].b);
        }
      });

      let tabla = jugadores.map(j => {
        let detalle = acumulado[j.id] || [];
        let total = detalle.reduce((a, b) => a + b, 0);

        return {
          nombre: j.nombre,
          total: total,
          detalle: detalle
        };
      });

      tabla.sort((a, b) => b.total - a.total);

      let html = `
        <table class="tabla-posiciones">
          <thead>
            <tr>
              <th>Jugador</th>
              <th>Total</th>
              <th>Puntos por partido</th>
            </tr>
          </thead>
          <tbody>
      `;

      tabla.forEach(j => {
        html += `
          <tr>
            <td>${j.nombre}</td>
            <td>${j.total}</td>
            <td>${j.detalle.length > 0 ? j.detalle.join(" - ") : "-"}</td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      contenedor.innerHTML += html;
      guardarEstado();
    }

    function resetearTorneo() {
      if (confirm("¿Seguro que quieres resetear todo el torneo?")) {
        sessionStorage.removeItem("torneoMK");
        jugadores = [];
        partidos = [];
        resultados = {};
        vueltaGenerada = false;
        ultimoJugadorId = 0;

        document.getElementById("numPlayers").value = "";
        document.getElementById("contenedorNombres").innerHTML = "";
        document.getElementById("contenedorFixture").innerHTML = "";
        document.getElementById("contenedorTabla").innerHTML = "";
        document.getElementById("inputsEdicion").innerHTML = "";
        document.getElementById("nuevosJugadores").value = "";
        document.getElementById("panelEdicion").classList.add("oculto");
      }
    }

    window.onload = function() {
      cargarEstado();
    };
  </script>

</body>
</html>
